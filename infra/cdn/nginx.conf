# =============================================================================
# NT219 Crypto Capstone — Nginx Local CDN Configuration
# Week 2: Serve static assets with aggressive caching + security headers
#
# Key security rules:
#   - Static assets: Cache-Control public, immutable, long max-age
#   - API responses: NEVER cached (no-store, private)
#   - Security headers on all responses
#   - No directory listing
#   - Block dotfiles access
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Logging format with cache status
    log_format cdn '$remote_addr - [$time_local] "$request" '
                   '$status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'cache_status=$upstream_cache_status '
                   'rt=$request_time';
    
    access_log /var/log/nginx/access.log cdn;
    
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    
    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;
    
    # ── Proxy cache zone for upstream API responses (NOT for private data) ──
    proxy_cache_path /var/cache/nginx/static 
                     levels=1:2 
                     keys_zone=static_cache:10m 
                     max_size=500m 
                     inactive=7d 
                     use_temp_path=off;
    
    # ── Rate limiting zone (basic DDoS protection at CDN layer) ──
    limit_req_zone $binary_remote_addr zone=cdn_limit:10m rate=30r/s;
    
    server {
        listen 80;
        server_name localhost *.nt219.local;
        
        # ── Security headers (applied to ALL responses) ──
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        
        # ── Block access to dotfiles (.env, .git, etc.) ──
        location ~ /\. {
            deny all;
            return 403;
        }
        
        # ── Health check endpoint ──
        location /health {
            return 200 '{"status":"OK","service":"nginx-cdn","week":2}';
            add_header Content-Type application/json always;
        }
        
        # ─────────────────────────────────────────────────────────────────
        # STATIC ASSETS — Aggressive public caching
        # These are safe to cache: images, CSS, JS, fonts
        # ─────────────────────────────────────────────────────────────────
        
        location /static/ {
            alias /usr/share/nginx/html/static/;
            autoindex off;   # NEVER allow directory listing
            
            limit_req zone=cdn_limit burst=50 nodelay;
            
            # Immutable static assets — cache for 1 year
            # Files should be fingerprinted (e.g., app.a1b2c3.js)
            location ~* \.(js|css|woff2?|ttf|eot|svg|ico)$ {
                expires 365d;
                add_header Cache-Control "public, max-age=31536000, immutable" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Cache-Status "STATIC" always;
                
                # Enable gzip for text-based assets
                gzip_static on;
            }
            
            # Images — cache for 30 days (may change more often)
            location ~* \.(jpg|jpeg|png|gif|webp|avif)$ {
                expires 30d;
                add_header Cache-Control "public, max-age=2592000" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Cache-Status "STATIC" always;
            }
            
            # Default static — cache for 7 days
            add_header Cache-Control "public, max-age=604800" always;
            add_header X-Cache-Status "STATIC" always;
        }
        
        # ─────────────────────────────────────────────────────────────────
        # API PROXY — NEVER cache (private/authenticated data)
        # Forward to Envoy API Gateway
        # ─────────────────────────────────────────────────────────────────
        
        location /api/ {
            # CRITICAL: Never cache API responses (may contain PII, auth data)
            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
            add_header Pragma "no-cache" always;
            add_header X-Cache-Status "BYPASS" always;
            add_header X-Content-Type-Options "nosniff" always;
            
            # Proxy to Envoy gateway
            proxy_pass http://envoy:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            # Disable proxy buffering for real-time API responses
            proxy_buffering off;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
        
        # ─────────────────────────────────────────────────────────────────
        # AUTH ROUTES — NEVER cache (tokens, sessions)
        # ─────────────────────────────────────────────────────────────────
        
        location /auth/ {
            add_header Cache-Control "no-store, private" always;
            add_header Pragma "no-cache" always;
            add_header X-Cache-Status "BYPASS" always;
            
            proxy_pass http://keycloak:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ─────────────────────────────────────────────────────────────────
        # DEFAULT — Return 404 for unmatched routes
        # ─────────────────────────────────────────────────────────────────
        
        location / {
            return 404 '{"error":"not_found","service":"nginx-cdn"}';
            add_header Content-Type application/json always;
        }
    }
}
