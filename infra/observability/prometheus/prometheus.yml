global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: nt219-local
    env: development

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Keycloak metrics (KC_METRICS_ENABLED=true exposes /realms/master/metrics)
  - job_name: keycloak
    metrics_path: /realms/master/metrics
    static_configs:
      - targets: [keycloak:8080]

  # Vault metrics (via sys/metrics endpoint, requires token)
  - job_name: vault
    metrics_path: /v1/sys/metrics
    params:
      format: [prometheus]
    bearer_token: "dev-root-token"
    static_configs:
      - targets: [vault:8200]

  # Envoy admin metrics
  - job_name: envoy
    metrics_path: /stats/prometheus
    static_configs:
      - targets: [envoy:10000]

  # Microservice placeholder jobs — uncomment when services are added (Week 3-4)
  # - job_name: catalog-service
