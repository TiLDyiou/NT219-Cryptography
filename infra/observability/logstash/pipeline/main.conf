# =============================================================================
# Logstash Pipeline — NT219 Crypto Capstone
# Input: Beats (port 5044) + TCP JSON (port 5000)
# Output: Elasticsearch with per-service index routing
# =============================================================================

input {
  # Filebeat / Metricbeat agents (added in Week 7-8)
  beats {
    port => 5044
  }

  # Direct TCP JSON input (microservices can send logs here)
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Route to per-service index based on 'service' field
  if [service] {
    mutate {
      add_field => { "[@metadata][index]" => "nt219-%{[service]}-%{+YYYY.MM.dd}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index]" => "nt219-misc-%{+YYYY.MM.dd}" }
    }
  }

  # Parse Vault audit log format (JSON wrapped in message field)
  if [type] == "vault-audit" {
    json {
      source => "message"
      target => "vault"
    }
    mutate {
      add_tag => ["vault-audit"]
    }
  }

  # Add timestamp if missing
  if ![@timestamp] {
    mutate {
      add_field => { "@timestamp" => "%{+ISO8601}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index]}"
  }
}
