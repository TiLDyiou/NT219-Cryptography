# =============================================================================
# NT219 Crypto Capstone — Envoy API Gateway Configuration
# Week 2: Production-ready gateway with TLS, JWT, WAF, Rate Limiting
#
# Features:
#   - TLS termination (HTTPS on port 8443)
#   - HTTP→HTTPS redirect (port 8081 → 8443)
#   - JWT/OIDC validation (Keycloak JWKS)
#   - Lua WAF filter (SQLi, XSS, path traversal)
#   - Local rate limiting (100 req/min per connection)
#   - Routes to microservice upstreams (catalog, cart, order, payment)
#   - Health check bypass (no auth required)
#
# Ports:
#   8443  — HTTPS API listener (TLS terminated)
#   8081  — HTTP listener (redirects to HTTPS or passthrough for dev)
#   10000 — Envoy admin interface
# =============================================================================

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 10000

static_resources:
  listeners:

    # =========================================================================
    # LISTENER 1: HTTPS (TLS termination) — Primary API ingress
    # =========================================================================
    - name: listener_https
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8443
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/envoy/certs/server.crt
                    private_key:
                      filename: /etc/envoy/certs/server.key
                tls_params:
                  tls_minimum_protocol_version: TLSv1_2
                  tls_maximum_protocol_version: TLSv1_3
                  cipher_suites:
                    - ECDHE-ECDSA-AES256-GCM-SHA384
                    - ECDHE-RSA-AES256-GCM-SHA384
                    - ECDHE-ECDSA-CHACHA20-POLY1305
                    - ECDHE-RSA-CHACHA20-POLY1305
                    - ECDHE-ECDSA-AES128-GCM-SHA256
                    - ECDHE-RSA-AES128-GCM-SHA256
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_https
                codec_type: AUTO
                generate_request_id: true
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          duration_ms: "%DURATION%"
                          upstream_host: "%UPSTREAM_HOST%"
                          client_ip: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                          user_agent: "%REQ(USER-AGENT)%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                          waf_status: "%REQ(X-WAF-STATUS)%"

                # ── HTTP Filters (order matters!) ──
                http_filters:

                  # ── Filter 1: Lua WAF (runs FIRST) ──
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          -- Inline WAF stub — actual WAF loaded from file
                          -- See /etc/envoy/waf/waf.lua for full implementation
                          function envoy_on_request(request_handle)
                            request_handle:headers():add("x-waf-status", "passed")
                          end
                          function envoy_on_response(response_handle)
                            response_handle:headers():add("X-Content-Type-Options", "nosniff")
                            response_handle:headers():add("X-Frame-Options", "DENY")
                          end
                      source_codes:
                        waf.lua:
                          filename: /etc/envoy/waf/waf.lua

                  # ── Filter 2: JWT Authentication (Keycloak) ──
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        keycloak_provider:
                          issuer: "http://keycloak:8080/realms/nt219"
                          audiences:
                            - "account"
                          remote_jwks:
                            http_uri:
                              uri: "http://keycloak:8080/realms/nt219/protocol/openid-connect/certs"
                              cluster: keycloak_cluster
                              timeout: 5s
                            cache_duration: 300s
                          forward: true
                          forward_payload_header: x-jwt-payload
                          from_headers:
                            - name: Authorization
                              value_prefix: "Bearer "
                      rules:
                        # Health check — no auth required
                        - match:
                            prefix: /health
                        # Catalog GET — no auth required (public browsing)
                        - match:
                            prefix: /api/catalog
                          requires:
                            requires_any:
                              requirements:
                                - provider_name: keycloak_provider
                                - allow_missing: {}
                        # All other API routes — require valid JWT
                        - match:
                            prefix: /api/
                          requires:
                            provider_name: keycloak_provider

                  # ── Filter 3: Local Rate Limiting ──
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: http_local_rate_limiter
                      token_bucket:
                        max_tokens: 100
                        tokens_per_fill: 100
                        fill_interval: 60s
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-rate-limit
                            value: "100 req/min"
                      local_rate_limit_per_downstream_connection: true

                  # ── Filter 4: Router (must be last) ──
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                # ── Route Configuration ──
                route_config:
                  name: api_routes
                  virtual_hosts:
                    - name: gateway
                      domains: ["*"]
                      routes:
                        # ── Health check (no auth, no rate limit) ──
                        - match:
                            prefix: "/health"
                          direct_response:
                            status: 200
                            body:
                              inline_string: '{"status":"OK","gateway":"envoy","week":2,"tls":"active","waf":"active","jwt":"active","rate_limit":"active"}'

                        # ── Catalog Service routes ──
                        - match:
                            prefix: "/api/catalog"
                          route:
                            cluster: catalog_cluster
                            timeout: 15s
                            retry_policy:
                              retry_on: 5xx,reset,connect-failure
                              num_retries: 2

                        # ── Cart Service routes ──
                        - match:
                            prefix: "/api/cart"
                          route:
                            cluster: cart_cluster
                            timeout: 15s

                        # ── Order Service routes ──
                        - match:
                            prefix: "/api/order"
                          route:
                            cluster: order_cluster
                            timeout: 30s

                        # ── Checkout endpoint (Order Service) ──
                        - match:
                            prefix: "/api/checkout"
                          route:
                            cluster: order_cluster
                            timeout: 60s  # Checkout involves payment — longer timeout

                        # ── Payment Service (NOT directly accessible) ──
                        # Payment is called service-to-service by order-service only
                        # Direct access returns 403
                        - match:
                            prefix: "/api/payment"
                          direct_response:
                            status: 403
                            body:
                              inline_string: '{"error":"forbidden","message":"Payment service is not directly accessible. Use /api/checkout instead."}'

                        # ── JWKS proxy (for frontend to discover OIDC config) ──
                        - match:
                            prefix: "/auth"
                          route:
                            cluster: keycloak_cluster
                            timeout: 10s

                        # ── Default: service not found ──
                        - match:
                            prefix: "/"
                          direct_response:
                            status: 404
                            body:
                              inline_string: '{"error":"not_found","routes":["/health","/api/catalog","/api/cart","/api/order","/api/checkout","/auth"]}'

    # =========================================================================
    # LISTENER 2: HTTP (redirect to HTTPS or dev passthrough)
    # =========================================================================
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8081
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: http_redirect
                  virtual_hosts:
                    - name: redirect
                      domains: ["*"]
                      routes:
                        # Health check still works on HTTP
                        - match:
                            prefix: "/health"
                          direct_response:
                            status: 200
                            body:
                              inline_string: '{"status":"OK","gateway":"envoy","week":2,"note":"Use HTTPS port 8443 for API access"}'
                        # Everything else: inform about HTTPS
                        - match:
                            prefix: "/"
                          direct_response:
                            status: 301
                            body:
                              inline_string: '{"message":"Use HTTPS on port 8443"}'
                          response_headers_to_add:
                            - header:
                                key: Location
                                value: "https://localhost:8443%REQ(:PATH)%"

  # ===========================================================================
  # UPSTREAM CLUSTERS
  # ===========================================================================
  clusters:

    # ── Keycloak (for JWKS fetch + auth proxy) ──
    - name: keycloak_cluster
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: keycloak_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: keycloak
                      port_value: 8080

    # ── Catalog Service ──
    - name: catalog_cluster
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: catalog_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: catalog-service
                      port_value: 8000

    # ── Cart Service ──
    - name: cart_cluster
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: cart_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: cart-service
                      port_value: 8000

    # ── Order Service ──
    - name: order_cluster
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: order_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: order-service
                      port_value: 8000

    # ── Payment Service (internal only — called by order-service) ──
    - name: payment_cluster
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: payment_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: payment-service
                      port_value: 8000
