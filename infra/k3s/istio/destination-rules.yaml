# =============================================================================
# NT219 Crypto Capstone — Istio DestinationRules
# Week 2: Configure mTLS mode for each microservice upstream
#
# What this does:
#   - Tells Istio sidecars to use ISTIO_MUTUAL TLS when connecting to each service
#   - Istio automatically provisions and rotates X.509 certificates (SPIFFE identity)
#   - Each service gets a unique identity: spiffe://cluster.local/ns/default/sa/<service>
#
# Reference: https://istio.io/latest/docs/reference/config/networking/destination-rule/
# =============================================================================

# ── Catalog Service ──
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: catalog-service-mtls
  namespace: default
  labels:
    app.kubernetes.io/part-of: nt219-crypto
    nt219/service: catalog
    nt219/week: "2"
spec:
  host: catalog-service.default.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100

---

