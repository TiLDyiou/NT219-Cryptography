# ── Payment Service (tighter connection limits — PCI scope) ──
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: payment-service-mtls
  namespace: default
  labels:
    app.kubernetes.io/part-of: nt219-crypto
    nt219/service: payment
    nt219/week: "2"
spec:
  host: payment-service.default.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 50   # Tighter limit for payment (PCI-DSS)
      tcp:
        maxConnections: 50             # Fewer connections needed
    outlierDetection:
      consecutive5xxErrors: 3          # Circuit breaker: eject after 3 errors
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 100
